name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write # upload release assets

jobs:
  # ---- NuGet packages via OIDC trusted publishing (no stored API key) ----
  nuget:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 11.0.x
          dotnet-quality: preview

      # Packs every IsPackable project in the solution (all nine library packages; tests/samples/tools opt out).
      - name: Pack
        run: dotnet pack StreamTransport.slnx -c Release -o artifacts

      # Trusted publishing: exchange the GitHub OIDC token for a short-lived NuGet.org key.
      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: login
        with:
          user: Agash

      - name: Push
        run: dotnet nuget push "artifacts/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --skip-duplicate

  # ---- Cross-platform single-file agent binaries ----
  agent:
    name: agent (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, rid: win-x64 }
          - { os: ubuntu-latest, rid: linux-x64 }
          - { os: ubuntu-24.04-arm, rid: linux-arm64 }
          # macOS (osx-arm64) is intentionally omitted: the -macos agent packaging (NativeAOT vs CoreCLR, .app vs
          # bare CLI, bundled FFmpeg, and a startup crash to chase down) is unfinished. The 9 libraries cover macOS
          # consumers; the macOS agent ships once that is sorted. Tracked as a follow-up.
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 11.0.x
          dotnet-quality: preview

      - name: Fetch FFmpeg
        shell: pwsh
        run: ./eng/fetch-ffmpeg.ps1 -Rids ${{ matrix.rid }}

      # Single-file self-contained net11.0 (the Linux head carries the PipeWire GPU path).
      - name: Publish single-file agent
        run: >
          dotnet publish samples/StreamTransport.Agent/StreamTransport.Agent.csproj
          -c Release -f net11.0 -r ${{ matrix.rid }} --self-contained
          -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/${{ matrix.rid }}

      # Ship the FFmpeg shared libraries next to the executable.
      - name: Bundle FFmpeg natives
        shell: pwsh
        run: Copy-Item native/ffmpeg/${{ matrix.rid }}/* publish/${{ matrix.rid }}/ -Force

      - name: Package
        shell: pwsh
        run: Compress-Archive -Path publish/${{ matrix.rid }}/* -DestinationPath streamtransport-agent-${{ matrix.rid }}.zip

      - uses: actions/upload-artifact@v7
        with:
          name: streamtransport-agent-${{ matrix.rid }}
          path: streamtransport-agent-${{ matrix.rid }}.zip

      - name: Attach to release
        if: github.event_name == 'release'
        run: gh release upload "${{ github.event.release.tag_name }}" streamtransport-agent-${{ matrix.rid }}.zip --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  # ---- Relay + coturn Docker image to Docker Hub ----
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Docker Hub publishing is optional: it runs only once DOCKERHUB_USERNAME/DOCKERHUB_TOKEN secrets are
      # configured. Until then the job no-ops (stays green) instead of failing the release on a missing login.
      - name: Check Docker Hub credentials
        id: dh
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DH_USER" ] && [ -n "$DH_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Docker Hub secrets not configured - skipping relay image publish."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v6
        if: steps.dh.outputs.ready == 'true'
      - uses: docker/setup-buildx-action@v3
        if: steps.dh.outputs.ready == 'true'
      - uses: docker/login-action@v3
        if: steps.dh.outputs.ready == 'true'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        if: steps.dh.outputs.ready == 'true'
        with:
          images: agash/streamtransport-relay
      - uses: docker/build-push-action@v6
        if: steps.dh.outputs.ready == 'true'
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
