name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write # upload release assets

# Serialize releases per ref; never cancel a publish that is already in flight.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---- NuGet packages via OIDC trusted publishing (no stored API key) ----
  nuget:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 11.0.x
          dotnet-quality: preview

      # Bundle the pinned LGPL FFmpeg 8.1 shared libraries into the package so Windows/Linux consumers get a
      # self-contained codec stack: fetch-ffmpeg.ps1 populates native/ffmpeg/<rid>/, which the
      # Agash.StreamTransport csproj packs into runtimes/<rid>/native. macOS is intentionally NOT bundled
      # (no LGPL macOS source here) - the loader probes the Homebrew prefixes, so a `brew install ffmpeg`
      # is picked up. This is the package-side equivalent of the agent job's per-RID bundling step.
      - name: Fetch FFmpeg natives to bundle (win/linux)
        shell: pwsh
        run: ./eng/fetch-ffmpeg.ps1 -Rids win-x64,linux-x64,linux-arm64

      # Packs every IsPackable project in the solution (all nine library packages; tests/samples/tools opt out).
      - name: Pack
        run: dotnet pack StreamTransport.slnx -c Release -o artifacts

      # Trusted publishing: exchange the GitHub OIDC token for a short-lived NuGet.org key.
      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: login
        with:
          user: Agash

      - name: Push
        run: dotnet nuget push "artifacts/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" --skip-duplicate

  # ---- Cross-platform single-file agent binaries ----
  agent:
    name: agent (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, rid: win-x64 }
          - { os: macos-26, rid: osx-arm64 }
          - { os: ubuntu-latest, rid: linux-x64 }
          - { os: ubuntu-24.04-arm, rid: linux-arm64 }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 11.0.x
          dotnet-quality: preview

      - name: Fetch FFmpeg
        if: runner.os != 'macOS'
        shell: pwsh
        run: ./eng/fetch-ffmpeg.ps1 -Rids ${{ matrix.rid }}

      # macOS publishes the net11.0-macos head (Syphon/Metal/CoreAudio); its bindings link the macOS 26.5 SDK.
      - name: Select Xcode 26.5 (macOS)
        if: runner.os == 'macOS'
        run: sudo xcode-select -s /Applications/Xcode_26.5.app/Contents/Developer
      - name: Install macos workload (macOS)
        if: runner.os == 'macOS'
        run: dotnet workload install macos

      # Windows/Linux: NativeAOT (PublishAot turns on automatically once a RID is set) - a single self-contained
      # native binary (verified: the win-x64 exe carries no coreclr/hostpolicy). No PublishSingleFile/self-extract
      # flags: NativeAOT supersedes them. The Linux head carries the PipeWire GPU path.
      - name: Publish NativeAOT agent (Windows/Linux)
        if: runner.os != 'macOS'
        run: >
          dotnet publish samples/StreamTransport.Agent/StreamTransport.Agent.csproj
          -c Release -f net11.0 -r ${{ matrix.rid }}
          -o publish/${{ matrix.rid }}

      # macOS: NativeAOT .app. PublishAot is on once a RID is set (verified: the inner binary links only
      # libSystem - no CoreCLR/Mono). CreatePackage=false yields a .app, not a .pkg installer. `-o` mishandles
      # -macos bundles (mirrors the absolute build path), so publish to the default bin location and stage the
      # .app below. FFmpeg is not bundled on macOS - the agent auto-detects a `brew install ffmpeg`.
      - name: Publish NativeAOT agent (macOS)
        if: runner.os == 'macOS'
        run: >
          dotnet publish samples/StreamTransport.Agent/StreamTransport.Agent.csproj
          -c Release -f net11.0-macos -r ${{ matrix.rid }} -p:CreatePackage=false

      # The .app's Metal shader library (default.metallib) is bundle-relative, so a bare binary can't run the GPU
      # alpha path - ship the .app plus a thin launcher so it works as `./streamtransport-agent <args>`.
      - name: Stage macOS .app + CLI launcher
        if: runner.os == 'macOS'
        run: |
          mkdir -p "publish/${{ matrix.rid }}"
          cp -R "samples/StreamTransport.Agent/bin/Release/net11.0-macos/${{ matrix.rid }}/streamtransport-agent.app" "publish/${{ matrix.rid }}/"
          cat > "publish/${{ matrix.rid }}/streamtransport-agent" <<'SH'
          #!/bin/sh
          here="$(cd "$(dirname "$0")" && pwd)"
          exec "$here/streamtransport-agent.app/Contents/MacOS/streamtransport-agent" "$@"
          SH
          chmod +x "publish/${{ matrix.rid }}/streamtransport-agent"

      # Windows/Linux ship the FFmpeg shared libraries next to the executable; macOS relies on `brew install ffmpeg`.
      - name: Bundle FFmpeg natives (Windows/Linux)
        if: runner.os != 'macOS'
        shell: pwsh
        run: Copy-Item native/ffmpeg/${{ matrix.rid }}/* publish/${{ matrix.rid }}/ -Force

      # Drop the native debug symbols (a ~60 MB .pdb) and XML doc files - not needed at runtime. macOS is skipped:
      # its files live inside the signed .app bundle and removing them would invalidate the code signature.
      - name: Strip debug symbols + XML docs (Windows/Linux)
        if: runner.os != 'macOS'
        shell: pwsh
        run: Get-ChildItem -Path "publish/${{ matrix.rid }}" -Recurse -Include *.pdb,*.xml | Remove-Item -Force

      - name: Package (Windows/Linux)
        if: runner.os != 'macOS'
        shell: pwsh
        run: Compress-Archive -Path publish/${{ matrix.rid }}/* -DestinationPath streamtransport-agent-${{ matrix.rid }}.zip
      # ditto preserves the .app bundle's symlinks and +x bits (Compress-Archive would drop them).
      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent "publish/${{ matrix.rid }}" "streamtransport-agent-${{ matrix.rid }}.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: streamtransport-agent-${{ matrix.rid }}
          path: streamtransport-agent-${{ matrix.rid }}.zip

      - name: Attach to release
        if: github.event_name == 'release'
        run: gh release upload "${{ github.event.release.tag_name }}" streamtransport-agent-${{ matrix.rid }}.zip --clobber
        env:
          GH_TOKEN: ${{ github.token }}

  # ---- Relay + coturn Docker image to Docker Hub ----
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # Docker Hub publishing is optional: it runs only once DOCKERHUB_USERNAME/DOCKERHUB_TOKEN secrets are
      # configured. Until then the job no-ops (stays green) instead of failing the release on a missing login.
      - name: Check Docker Hub credentials
        id: dh
        env:
          DH_USER: ${{ secrets.DOCKERHUB_USERNAME }}
          DH_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DH_USER" ] && [ -n "$DH_TOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Docker Hub secrets not configured - skipping relay image publish."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v6
        if: steps.dh.outputs.ready == 'true'
      - uses: docker/setup-buildx-action@v3
        if: steps.dh.outputs.ready == 'true'
      - uses: docker/login-action@v3
        if: steps.dh.outputs.ready == 'true'
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        if: steps.dh.outputs.ready == 'true'
        with:
          images: agash/streamtransport-relay
      - uses: docker/build-push-action@v6
        if: steps.dh.outputs.ready == 'true'
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
