name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: build+test (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, rid: win-x64 }
          - { os: macos-latest, rid: osx-arm64 }
          - { os: ubuntu-latest, rid: linux-x64 }
          - { os: ubuntu-24.04-arm, rid: linux-arm64 }
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 11.0.x
          dotnet-quality: preview

      # Hardware codec libraries. Desktop RIDs use BtbN LGPL builds; macOS uses Homebrew's ffmpeg.
      - name: Fetch FFmpeg (Windows/Linux)
        if: runner.os != 'macOS'
        shell: pwsh
        run: ./eng/fetch-ffmpeg.ps1 -Rids ${{ matrix.rid }}

      # macOS: Homebrew's ffmpeg is VideoToolbox-enabled, but it installs under the Homebrew prefix where the
      # loader never looks. Symlink the dylibs into native/ffmpeg/<rid> so FFmpegLibrary's dev-fallback finds
      # them (and hevc_videotoolbox encode/decode works).
      - name: Install + link FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg
          mkdir -p native/ffmpeg/${{ matrix.rid }}
          ln -sf "$(brew --prefix ffmpeg)"/lib/*.dylib native/ffmpeg/${{ matrix.rid }}/
          ls -l native/ffmpeg/${{ matrix.rid }}/

      - name: Restore
        run: dotnet restore StreamTransport.slnx

      - name: Build
        run: dotnet build StreamTransport.slnx -c Release --no-restore

      # The gating suite: everything except TestCategory=Integration. Integration covers full real-socket E2E
      # tests (HttpListener relay + loopback ICE/DTLS/SRTP) that are intermittently slow-or-stuck to establish
      # under a loaded CI host - a connect race specific to rapid in-process loopback setup, not a logic bug
      # (cross-machine runs connect reliably; the per-component logic is covered by the WebRtc unit + loopback
      # tests here). Keeping them off the gate stops a transient flake from blocking every build. (#1)
      - name: Test
        run: dotnet test StreamTransport.slnx -c Release --no-build --filter "TestCategory!=Integration"

      # Non-gating: exercise the real-socket E2E integration tests once (Linux, most reliable loopback) so they
      # still get coverage, but a transient connect flake is reported, not fatal.
      - name: Integration tests (non-gating)
        if: matrix.rid == 'linux-x64'
        continue-on-error: true
        run: dotnet test StreamTransport.slnx -c Release --no-build --filter "TestCategory=Integration"
