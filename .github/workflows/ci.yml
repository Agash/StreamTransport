name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: build+test (${{ matrix.rid }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, rid: win-x64 }
          - { os: macos-latest, rid: osx-arm64 }
          - { os: ubuntu-latest, rid: linux-x64 }
          - { os: ubuntu-24.04-arm, rid: linux-arm64 }
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 11.0.x
          dotnet-quality: preview

      # Hardware codec libraries. Desktop RIDs use BtbN LGPL builds; macOS uses Homebrew's ffmpeg.
      - name: Fetch FFmpeg (Windows/Linux)
        if: runner.os != 'macOS'
        shell: pwsh
        run: ./eng/fetch-ffmpeg.ps1 -Rids ${{ matrix.rid }}

      # macOS: Homebrew's ffmpeg is VideoToolbox-enabled, but it installs under the Homebrew prefix where the
      # loader never looks. Symlink the dylibs into native/ffmpeg/<rid> so FFmpegLibrary's dev-fallback finds
      # them (and hevc_videotoolbox encode/decode works).
      - name: Install + link FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ffmpeg
          mkdir -p native/ffmpeg/${{ matrix.rid }}
          ln -sf "$(brew --prefix ffmpeg)"/lib/*.dylib native/ffmpeg/${{ matrix.rid }}/
          ls -l native/ffmpeg/${{ matrix.rid }}/

      - name: Restore
        run: dotnet restore StreamTransport.slnx

      - name: Build
        run: dotnet build StreamTransport.slnx -c Release --no-restore

      # The whole suite runs here, including the real-socket / full-WebRTC E2E tests: those are marked
      # DoNotParallelize so they get the sequential scope (full CPU for their async handshakes) instead of
      # being hidden. The Integration filter is reserved for tests that need a genuine external dependency
      # (none today) - it stays so such a test could opt out without a workflow change.
      - name: Test
        run: dotnet test StreamTransport.slnx -c Release --no-build --filter "TestCategory!=Integration"
